<DOCTYPE html>
    <html lang="en">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>HAPPY BIRTHDAY</title>
            <link rel="stylesheet" href="style.css">
        </head>
        <body>
            <div class="card">
                <div class="back"></div>
                <div class="front">
                    <div class="hover-text">Happy Birthday</div>
                    <div class="cover-shape-large">
                        <div class="shape-diamond"></div>
                        <div class="shape-block"></div>

                    </div>
                    <div class="cover-shape-small">
                        <div class="shape-diamond"></div>
                        <div class="shape-block"></div>
                        <div class="cake">
                            <div class="layer layer-bottom"></div>
                            <div class="layer layer-midle"></div>
                            <div class="layer layer-top"></div>
                            <div class="icing"></div>
                            <div class="drip drip1"></div>
                            <div class="drip drip2"></div>
                            <div class="drip drip3"></div>
                            <div class="candle">
                                <div class="frame"></div>
                            </div>
                        </div>

                    </div>
                    
                </div>
                 <div class="text-container">
                    <img src="images/IMG_E2140.JPG" alt="cc">
                <p>Happy Birthday Selakhile</p>
                <div>Your First Digital Card <br> Developed Just For You</div>
                <p>Have A Blast</p>
            </div>


            </div>
                   </div>
        </body>

    </html>
